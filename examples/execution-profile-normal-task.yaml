# Complete local browser fixture demonstrating the normal execution profile.
name: execution-profile-normal-browser-demo
allowed_windows:
  - DeskPilot Browser Fixture
timeout_seconds: 120
entropy_budget: 1.5
config:
  policy_preset: strict_qa
  require_operator_approval: false
  confirmed_steps:
    - click-submit
  execution_profile:
    persona: normal
    enabled: true
    action_delay_seconds: [0.05, 0.18]
    retry_delay_seconds: [0.2, 0.6]
    action_delay_distribution: center_weighted
    retry_delay_distribution: center_weighted
    action_variant_distribution: uniform
    hesitation_probability: 0.1
    movement_smoothness: 0.6
    keyboard_interval_seconds: [0.01, 0.03]
    scroll_interval_seconds: [0.02, 0.05]
    random_seed: 23
steps:
  - id: wait-for-email-label
    action: wait_for
    target: Email
    category: recognition
    timeout_seconds: 5
    verify:
      type: visible_text
      text: Email
    expected_state:
      after: browser-form-ready
    recovery:
      - reason: transient_loading
        actions:
          - wait_for_loading
          - abort_with_trace
  - id: click-email-field
    action: click_text
    target: Email
    depends_on:
      - wait-for-email-label
    safe_action_variants:
      - click_uia
    expected_state:
      before: browser-form-ready
      after: email-focused
    recovery:
      - reason: missed_target
        actions:
          - reobserve_screen
          - retry_with_fresh_candidates
  - id: type-email
    action: type_text
    text: normal-profile@example.test
    depends_on:
      - click-email-field
    expected_state:
      before: email-focused
      after: email-entered
  - id: scroll-to-submit
    action: scroll_until
    target: Submit Browser Fixture
    depends_on:
      - type-email
    region:
      x: 0
      y: 0
      width: 1400
      height: 1000
    retry: 4
    expected_state:
      before: email-entered
      after: submit-visible
    recovery:
      - reason: missed_target
        actions:
          - scroll_search_region
          - retry_with_fresh_candidates
  - id: click-submit
    action: click_text
    target: Submit Browser Fixture
    category: submission
    requires_confirmation: true
    depends_on:
      - scroll-to-submit
    checkpoint:
      type: visible_text
      text: Submit Browser Fixture
    verify:
      type: visible_text
      text: Browser fixture success
    expected_state:
      before: submit-visible
      after: browser-submitted
