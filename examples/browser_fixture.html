<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeskPilot Browser Fixture</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        color: #172033;
        background: #f4f7fb;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 96px;
      }

      label,
      input,
      button {
        display: block;
        font-size: 18px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 8px;
        padding: 12px;
      }

      .spacer {
        min-height: 720px;
      }

      button {
        padding: 12px 18px;
        cursor: pointer;
      }

      #status {
        margin-top: 20px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DeskPilot Browser Fixture</h1>
      <label for="email">Email</label>
      <input id="email" name="email" autocomplete="off" />
      <div class="spacer" aria-hidden="true"></div>
      <button id="submit" type="button">Submit Browser Fixture</button>
      <p id="status" role="status"></p>
    </main>
    <script>
      document.getElementById("submit").addEventListener("click", () => {
        const email = document.getElementById("email").value.trim();
        document.getElementById("status").textContent = email
          ? "Browser fixture success"
          : "Email is required";
      });
    </script>
  </body>
</html>
