site_id: instagram
version: "1"
domains:
  - host: instagram.com
    include_subdomains: true
    purpose: primary
  - host: accountscenter.instagram.com
    include_subdomains: true
    purpose: account-settings
allowed_window_titles:
  - Instagram
landmarks:
  - id: home
    action: click_text
    target: Home
  - id: search
    action: click_text
    target: Search
  - id: profile
    action: click_text
    target: Profile
  - id: notifications
    action: click_text
    target: Notifications
  - id: messages
    action: click_text
    target: Messages
  - id: settings
    action: click_text
    target: Settings
  - id: composer
    action: click_text
    target: Create
flows:
  - id: open-home
    description: Open the Instagram home feed.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-home
        action: click_text
        landmark: home
  - id: open-search
    description: Open Instagram search without submitting a query.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-search
        action: click_text
        landmark: search
  - id: open-profile
    description: Open the profile surface.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-profile
        action: click_text
        landmark: profile
  - id: open-notifications
    description: Open notifications.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-notifications
        action: click_text
        landmark: notifications
  - id: open-messages
    description: Open messages without sending content.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-messages
        action: click_text
        landmark: messages
  - id: open-settings
    description: Open settings navigation.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-settings
        action: click_text
        landmark: settings
  - id: open-composer
    description: Open the create surface without publishing.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-composer
        action: click_text
        landmark: composer
blocked_states:
  - id: logged-out
    detector: "visible_text:Log in"
    reason: Log in manually before running Instagram playbook flows.
  - id: consent
    detector: "visible_text:Allow all cookies"
    reason: Resolve the cookie or consent dialog manually.
  - id: captcha
    detector: "visible_text:suspicious"
    reason: CAPTCHA or suspicious-activity challenges are not automated.
  - id: permission
    detector: "visible_text:Try again later"
    reason: Account or permission restrictions must be resolved manually.
  - id: unsupported-layout
    detector: "visible_text:unsupported browser"
    reason: The current layout does not match this playbook.
  - id: ambiguous-target
    detector: "candidate_count:>1"
    reason: Multiple matching targets require a narrower flow or manual choice.
