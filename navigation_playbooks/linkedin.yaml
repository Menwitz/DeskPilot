site_id: linkedin
version: "1"
domains:
  - host: linkedin.com
    include_subdomains: true
    purpose: primary
  - host: linkedin.cn
    include_subdomains: true
    purpose: regional-alternate
allowed_window_titles:
  - LinkedIn
landmarks:
  - id: home
    action: click_text
    target: Home
  - id: search
    action: click_text
    target: Search
  - id: profile
    action: click_text
    target: Me
  - id: notifications
    action: click_text
    target: Notifications
  - id: messages
    action: click_text
    target: Messaging
  - id: settings
    action: click_text
    target: Settings & Privacy
  - id: composer
    action: click_text
    target: Start a post
flows:
  - id: open-home
    description: Open the LinkedIn feed.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-home
        action: click_text
        landmark: home
  - id: open-search
    description: Open LinkedIn search without submitting a query.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-search
        action: click_text
        landmark: search
  - id: open-profile
    description: Open the profile menu or profile surface.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-profile
        action: click_text
        landmark: profile
  - id: open-notifications
    description: Open notification navigation.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-notifications
        action: click_text
        landmark: notifications
  - id: open-messages
    description: Open LinkedIn messaging without sending content.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-messages
        action: click_text
        landmark: messages
  - id: open-settings
    description: Open account settings navigation.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-profile-menu
        action: click_text
        landmark: profile
      - id: open-settings
        action: click_text
        landmark: settings
  - id: open-composer
    description: Open the post composer without publishing.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-composer
        action: click_text
        landmark: composer
  - id: publish-post
    description: Fill the LinkedIn composer with approved content and publish.
    timeout_seconds: 60
    retry: 1
    confidence_threshold: 0.85
    steps:
      - id: open-composer
        action: click_text
        landmark: composer
      - id: fill-post
        action: type_text
        text: "{{post_text}}\n\n{{post_url}}\n\n{{post_tags}}"
      - id: publish-post
        action: click_text
        target: Post
        requires_confirmation: true
        sensitive_category: publish
        checkpoint:
          type: visible_text
          text: "{{post_text}}"
blocked_states:
  - id: logged-out
    detector: "visible_text:Sign in"
    reason: Sign in manually before running LinkedIn playbook flows.
  - id: consent
    detector: "visible_text:Accept cookies"
    reason: Resolve the cookie or consent dialog manually.
  - id: captcha
    detector: "visible_text:security verification"
    reason: CAPTCHA or suspicious-activity challenges are not automated.
  - id: permission
    detector: "visible_text:restricted"
    reason: Account or permission restrictions must be resolved manually.
  - id: unsupported-layout
    detector: "visible_text:unsupported browser"
    reason: The current layout does not match this playbook.
  - id: ambiguous-target
    detector: "candidate_count:>1"
    reason: Multiple matching targets require a narrower flow or manual choice.
