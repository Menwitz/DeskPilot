site_id: x-twitter
version: "1"
domains:
  - host: x.com
    include_subdomains: true
    purpose: primary
  - host: twitter.com
    include_subdomains: true
    purpose: legacy-alternate
allowed_window_titles:
  - X
  - Twitter
landmarks:
  - id: home
    action: click_text
    target: Home
  - id: search
    action: click_text
    target: Search
  - id: profile
    action: click_text
    target: Profile
  - id: notifications
    action: click_text
    target: Notifications
  - id: messages
    action: click_text
    target: Messages
  - id: settings
    action: click_text
    target: Settings and privacy
  - id: composer
    action: click_text
    target: Post
flows:
  - id: open-home
    description: Open the X home timeline.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-home
        action: click_text
        landmark: home
  - id: open-search
    description: Open X search without submitting a query.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-search
        action: click_text
        landmark: search
  - id: open-profile
    description: Open the profile surface.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-profile
        action: click_text
        landmark: profile
  - id: open-notifications
    description: Open notifications.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-notifications
        action: click_text
        landmark: notifications
  - id: open-messages
    description: Open messages without sending content.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-messages
        action: click_text
        landmark: messages
  - id: open-settings
    description: Open settings navigation.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-settings
        action: click_text
        landmark: settings
  - id: open-composer
    description: Open the post composer without posting.
    timeout_seconds: 30
    retry: 1
    steps:
      - id: open-composer
        action: click_text
        landmark: composer
blocked_states:
  - id: logged-out
    detector: "visible_text:Sign in"
    reason: Sign in manually before running X/Twitter playbook flows.
  - id: consent
    detector: "visible_text:cookie"
    reason: Resolve the cookie or consent dialog manually.
  - id: captcha
    detector: "visible_text:challenge"
    reason: CAPTCHA or suspicious-activity challenges are not automated.
  - id: permission
    detector: "visible_text:account suspended"
    reason: Account or permission restrictions must be resolved manually.
  - id: unsupported-layout
    detector: "visible_text:Something went wrong"
    reason: The current layout does not match this playbook.
  - id: ambiguous-target
    detector: "candidate_count:>1"
    reason: Multiple matching targets require a narrower flow or manual choice.
