name: Virtual desktop new task
allowed_windows:
  - Windows
timeout_seconds: 30
steps:
  - id: create-virtual-desktop
    action: press_key
    text: ctrl+win+d
    verify:
      type: visible_text
      text: Desktop
  - id: confirm-new-desktop
    action: assert_visible
    verify:
      type: visible_text
      text: Desktop
