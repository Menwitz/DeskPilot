name: Notepad select all review task
allowed_windows:
  - Notepad
timeout_seconds: 20
steps:
  - id: select-all-text
    action: press_key
    text: ctrl+a
    verify:
      type: visible_text
      text: Notepad
  - id: confirm-notepad-visible
    action: assert_visible
    verify:
      type: visible_text
      text: Notepad
