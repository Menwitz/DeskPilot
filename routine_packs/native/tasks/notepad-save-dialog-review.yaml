name: Notepad save dialog review task
allowed_windows:
  - Notepad
timeout_seconds: 30
steps:
  - id: open-save-dialog
    action: press_key
    text: ctrl+s
    verify:
      type: visible_text
      text: Save
  - id: close-save-dialog
    action: press_key
    text: escape
    verify:
      type: visible_text
      text: Notepad
