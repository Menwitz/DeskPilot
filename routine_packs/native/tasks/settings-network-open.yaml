name: Windows network settings open task
allowed_windows:
  - Windows
  - Settings
timeout_seconds: 30
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: type-network-settings-uri
    action: type_text
    text: "ms-settings:network"
    verify:
      type: visible_text
      text: "ms-settings:network"
  - id: submit-settings-uri
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Network
  - id: confirm-settings-page
    action: assert_visible
    verify:
      type: visible_text
      text: Settings
