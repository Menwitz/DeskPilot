name: Notepad zoom reset task
allowed_windows:
  - Notepad
timeout_seconds: 20
steps:
  - id: reset-zoom
    action: press_key
    text: ctrl+0
    verify:
      type: visible_text
      text: Notepad
  - id: confirm-notepad-visible
    action: assert_visible
    verify:
      type: visible_text
      text: Notepad
