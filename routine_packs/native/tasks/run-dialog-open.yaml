name: Windows Run dialog open task
allowed_windows:
  - Windows
timeout_seconds: 25
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: close-run-dialog
    action: press_key
    text: escape
    verify:
      type: visible_text
      text: Windows
