name: Notepad zoom out task
allowed_windows:
  - Notepad
timeout_seconds: 20
steps:
  - id: zoom-out
    action: press_key
    text: ctrl+minus
    verify:
      type: visible_text
      text: Notepad
  - id: confirm-notepad-visible
    action: assert_visible
    verify:
      type: visible_text
      text: Notepad
