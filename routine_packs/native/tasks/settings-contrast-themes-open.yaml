name: Windows contrast themes settings open task
allowed_windows:
  - Windows
  - Settings
timeout_seconds: 30
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: type-settings-contrast-themes-open-uri
    action: type_text
    text: "ms-settings:easeofaccess-highcontrast"
    verify:
      type: visible_text
      text: "ms-settings:easeofaccess-highcontrast"
  - id: submit-settings-uri
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Contrast
