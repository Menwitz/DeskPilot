name: Calculator date calculation mode task
allowed_windows:
  - Calculator
timeout_seconds: 30
steps:
  - id: open-mode-menu
    action: click_text
    target: Open Navigation
  - id: choose-date-calculation
    action: click_text
    target: Date Calculation
    verify:
      type: visible_text
      text: Date Calculation
  - id: confirm-date-calculation-mode
    action: assert_visible
    verify:
      type: visible_text
      text: Date Calculation
