name: Virtual desktop switch right task
allowed_windows:
  - Windows
timeout_seconds: 30
steps:
  - id: switch-desktop-right
    action: press_key
    text: ctrl+win+right
    verify:
      type: visible_text
      text: Desktop
  - id: confirm-desktop-right
    action: assert_visible
    verify:
      type: visible_text
      text: Desktop
