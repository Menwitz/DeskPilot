name: Character Map open task
allowed_windows:
  - Windows
  - Character Map
timeout_seconds: 30
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: type-character-map-command
    action: type_text
    text: charmap
    verify:
      type: visible_text
      text: charmap
  - id: submit-character-map-command
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Character Map
