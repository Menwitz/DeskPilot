name: Calculator scientific mode task
allowed_windows:
  - Calculator
timeout_seconds: 30
steps:
  - id: open-mode-menu
    action: click_text
    target: Open Navigation
  - id: choose-scientific
    action: click_text
    target: Scientific
    verify:
      type: visible_text
      text: Scientific
  - id: confirm-scientific-mode
    action: assert_visible
    verify:
      type: visible_text
      text: Scientific
