name: Window snap left task
allowed_windows:
  - Windows
timeout_seconds: 20
steps:
  - id: confirm-window
    action: wait_for
    target: Windows
  - id: snap-left
    action: press_key
    text: win+left
    verify:
      type: visible_text
      text: Windows
  - id: confirm-window-after-snap
    action: assert_visible
    verify:
      type: visible_text
      text: Windows
