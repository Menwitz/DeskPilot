name: Window snap right task
allowed_windows:
  - Windows
timeout_seconds: 30
steps:
  - id: confirm-window
    action: wait_for
    target: Windows
  - id: snap-right
    action: press_key
    text: win+right
    verify:
      type: visible_text
      text: Windows
  - id: confirm-window-after-snap
    action: assert_visible
    verify:
      type: visible_text
      text: Windows
