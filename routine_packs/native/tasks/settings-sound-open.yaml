name: Windows sound settings open task
allowed_windows:
  - Windows
  - Settings
timeout_seconds: 30
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: type-sound-settings-uri
    action: type_text
    text: "ms-settings:sound"
    verify:
      type: visible_text
      text: "ms-settings:sound"
  - id: submit-settings-uri
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Sound
