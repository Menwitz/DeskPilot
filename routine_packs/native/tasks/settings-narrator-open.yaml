name: Windows narrator settings open task
allowed_windows:
  - Windows
  - Settings
timeout_seconds: 30
steps:
  - id: open-run-dialog
    action: press_key
    text: win+r
    verify:
      type: visible_text
      text: Run
  - id: type-settings-narrator-open-uri
    action: type_text
    text: "ms-settings:easeofaccess-narrator"
    verify:
      type: visible_text
      text: "ms-settings:easeofaccess-narrator"
  - id: submit-settings-uri
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Narrator
