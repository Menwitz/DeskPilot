name: Browser MIDI devices settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-midi-devices-settings-open-url
    action: type_text
    text: "browser://settings/content/midiDevices"
    verify:
      type: visible_text
      text: "browser://settings/content/midiDevices"
  - id: load-midi-devices-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: MIDI devices
