name: Browser payment handlers settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-payment-handlers-settings-open-url
    action: type_text
    text: "browser://settings/content/paymentHandler"
    verify:
      type: visible_text
      text: "browser://settings/content/paymentHandler"
  - id: load-payment-handlers-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Payment handlers
