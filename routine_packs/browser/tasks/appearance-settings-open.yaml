name: Browser appearance settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-appearance-settings-url
    action: type_text
    text: "browser://settings/appearance"
    verify:
      type: visible_text
      text: "browser://settings/appearance"
  - id: load-appearance-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Appearance
