name: Browser extension shortcuts open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-extension-shortcuts-url
    action: type_text
    text: "browser://extensions/shortcuts"
    verify:
      type: visible_text
      text: "browser://extensions/shortcuts"
  - id: load-extension-shortcuts
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Shortcuts
