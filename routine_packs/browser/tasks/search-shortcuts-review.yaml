name: Browser search shortcuts review task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-search-shortcuts-url
    action: type_text
    text: "browser://settings/searchEngines"
    verify:
      type: visible_text
      text: "browser://settings/searchEngines"
  - id: load-search-shortcuts
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Search engines
