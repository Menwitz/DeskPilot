name: Browser site permissions settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-site-permissions-url
    action: type_text
    text: "browser://settings/content"
    verify:
      type: visible_text
      text: "browser://settings/content"
  - id: load-site-permissions
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Permissions
