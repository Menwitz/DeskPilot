name: Browser protected content settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-protected-content-url
    action: type_text
    text: "browser://settings/content/protectedContent"
    verify:
      type: visible_text
      text: "browser://settings/content/protectedContent"
  - id: load-protected-content
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Protected content
