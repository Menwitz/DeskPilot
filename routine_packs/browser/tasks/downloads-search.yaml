name: Browser downloads search task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: open-downloads
    action: press_key
    text: ctrl+j
    verify:
      type: visible_text
      text: Downloads
  - id: focus-download-search
    action: click_text
    target: Search
  - id: type-download-query
    action: type_text
    text: Reviewed download
    verify:
      type: visible_text
      text: Reviewed download
