name: Browser file system access settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-file-system-access-settings-open-url
    action: type_text
    text: "browser://settings/content/fileSystemWrite"
    verify:
      type: visible_text
      text: "browser://settings/content/fileSystemWrite"
  - id: load-file-system-access-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: File system access
