name: Browser third-party cookies settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-third-party-cookies-settings-open-url
    action: type_text
    text: "browser://settings/cookies"
    verify:
      type: visible_text
      text: "browser://settings/cookies"
  - id: load-third-party-cookies-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Third-party cookies
