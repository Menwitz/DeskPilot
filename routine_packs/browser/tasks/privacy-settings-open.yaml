name: Browser privacy settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-privacy-settings-url
    action: type_text
    text: browser://settings/privacy
    verify:
      type: visible_text
      text: browser://settings/privacy
  - id: load-privacy-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Privacy
