name: Browser search settings review task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-search-settings-url
    action: type_text
    text: browser://settings/search
    verify:
      type: visible_text
      text: browser://settings/search
  - id: load-search-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Search
