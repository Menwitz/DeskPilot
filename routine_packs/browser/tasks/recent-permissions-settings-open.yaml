name: Browser recent permissions settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-recent-permissions-settings-open-url
    action: type_text
    text: "browser://settings/content/recent"
    verify:
      type: visible_text
      text: "browser://settings/content/recent"
  - id: load-recent-permissions-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Recent activity
