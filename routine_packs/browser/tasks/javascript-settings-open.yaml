name: Browser JavaScript settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-javascript-settings-url
    action: type_text
    text: "browser://settings/content/javascript"
    verify:
      type: visible_text
      text: "browser://settings/content/javascript"
  - id: load-javascript-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: JavaScript
