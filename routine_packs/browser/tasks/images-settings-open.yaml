name: Browser images settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-images-settings-url
    action: type_text
    text: "browser://settings/content/images"
    verify:
      type: visible_text
      text: "browser://settings/content/images"
  - id: load-images-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Images
