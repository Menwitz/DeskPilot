name: Browser copy page link task
allowed_windows:
  - Browser
timeout_seconds: 20
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: copy-address
    action: press_key
    text: ctrl+c
  - id: confirm-browser-after-copy
    action: assert_visible
    verify:
      type: visible_text
      text: Browser
