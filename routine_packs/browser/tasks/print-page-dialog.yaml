name: Browser print page dialog task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: open-print-dialog
    action: press_key
    text: ctrl+p
    verify:
      type: visible_text
      text: Print
  - id: review-print-dialog
    action: wait_for
    target: Print
  - id: close-print-dialog
    action: press_key
    text: escape
    verify:
      type: visible_text
      text: Browser
