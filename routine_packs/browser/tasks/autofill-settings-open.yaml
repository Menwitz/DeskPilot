name: Browser autofill settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-autofill-settings-url
    action: type_text
    text: browser://settings/autofill
    verify:
      type: visible_text
      text: browser://settings/autofill
  - id: load-autofill-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Autofill
