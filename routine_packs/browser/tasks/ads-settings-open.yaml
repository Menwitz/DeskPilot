name: Browser ads settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-ads-settings-url
    action: type_text
    text: "browser://settings/content/ads"
    verify:
      type: visible_text
      text: "browser://settings/content/ads"
  - id: load-ads-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Ads
