name: Browser language settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-language-url
    action: type_text
    text: browser://settings/languages
    verify:
      type: visible_text
      text: browser://settings/languages
  - id: load-language-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Languages
