name: Browser about page open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-about-url
    action: type_text
    text: browser://settings/help
    verify:
      type: visible_text
      text: browser://settings/help
  - id: load-about-page
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: About
