name: Browser new tab settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-new-tab-settings-url
    action: type_text
    text: "browser://settings/newTabPage"
    verify:
      type: visible_text
      text: "browser://settings/newTabPage"
  - id: load-new-tab-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: New tab
