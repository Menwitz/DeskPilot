name: Browser reload page task
allowed_windows:
  - Browser
timeout_seconds: 25
steps:
  - id: confirm-page
    action: wait_for
    target: Page
  - id: reload-page
    action: press_key
    text: ctrl+r
    verify:
      type: visible_text
      text: Page
  - id: confirm-page-reloaded
    action: assert_visible
    verify:
      type: visible_text
      text: Page
