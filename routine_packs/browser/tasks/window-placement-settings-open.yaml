name: Browser window placement settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-window-placement-settings-open-url
    action: type_text
    text: "browser://settings/content/windowPlacement"
    verify:
      type: visible_text
      text: "browser://settings/content/windowPlacement"
  - id: load-window-placement-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Window placement
