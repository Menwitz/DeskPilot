name: Browser idle detection settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-idle-detection-settings-open-url
    action: type_text
    text: "browser://settings/content/idleDetection"
    verify:
      type: visible_text
      text: "browser://settings/content/idleDetection"
  - id: load-idle-detection-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Idle detection
