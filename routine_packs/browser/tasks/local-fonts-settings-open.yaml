name: Browser local fonts settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-local-fonts-settings-open-url
    action: type_text
    text: "browser://settings/content/localFonts"
    verify:
      type: visible_text
      text: "browser://settings/content/localFonts"
  - id: load-local-fonts-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Local fonts
