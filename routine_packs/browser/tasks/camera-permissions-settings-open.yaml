name: Browser camera permissions settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-camera-permissions-url
    action: type_text
    text: "browser://settings/content/camera"
    verify:
      type: visible_text
      text: "browser://settings/content/camera"
  - id: load-camera-permissions
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Camera
