name: Browser sound settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-sound-settings-url
    action: type_text
    text: "browser://settings/content/sound"
    verify:
      type: visible_text
      text: "browser://settings/content/sound"
  - id: load-sound-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Sound
