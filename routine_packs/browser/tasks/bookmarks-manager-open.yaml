name: Browser bookmarks manager open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-bookmarks-url
    action: type_text
    text: browser://bookmarks
    verify:
      type: visible_text
      text: browser://bookmarks
  - id: load-bookmarks
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Bookmarks
