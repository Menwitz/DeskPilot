name: Browser performance settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-performance-settings-url
    action: type_text
    text: "browser://settings/performance"
    verify:
      type: visible_text
      text: "browser://settings/performance"
  - id: load-performance-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Performance
