name: Browser security settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-security-settings-url
    action: type_text
    text: "browser://settings/security"
    verify:
      type: visible_text
      text: "browser://settings/security"
  - id: load-security-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Security
