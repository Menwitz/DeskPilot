name: Browser automatic downloads settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-automatic-downloads-url
    action: type_text
    text: "browser://settings/content/automaticDownloads"
    verify:
      type: visible_text
      text: "browser://settings/content/automaticDownloads"
  - id: load-automatic-downloads
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Automatic downloads
