name: Browser accessibility settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-accessibility-url
    action: type_text
    text: browser://settings/accessibility
    verify:
      type: visible_text
      text: browser://settings/accessibility
  - id: load-accessibility
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Accessibility
