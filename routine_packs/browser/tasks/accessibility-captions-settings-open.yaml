name: Browser captions settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-captions-settings-url
    action: type_text
    text: "browser://settings/accessibility/captions"
    verify:
      type: visible_text
      text: "browser://settings/accessibility/captions"
  - id: load-captions-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Captions
