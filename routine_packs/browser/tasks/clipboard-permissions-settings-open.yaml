name: Browser clipboard permissions settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-clipboard-permissions-url
    action: type_text
    text: "browser://settings/content/clipboard"
    verify:
      type: visible_text
      text: "browser://settings/content/clipboard"
  - id: load-clipboard-permissions
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Clipboard
