name: Browser all sites settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-all-sites-settings-open-url
    action: type_text
    text: "browser://settings/content/all"
    verify:
      type: visible_text
      text: "browser://settings/content/all"
  - id: load-all-sites-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: All sites
