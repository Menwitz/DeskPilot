name: Browser default browser settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-default-browser-settings-url
    action: type_text
    text: "browser://settings/defaultBrowser"
    verify:
      type: visible_text
      text: "browser://settings/defaultBrowser"
  - id: load-default-browser-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Default browser
