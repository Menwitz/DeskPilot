name: Browser background sync settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-background-sync-url
    action: type_text
    text: "browser://settings/content/backgroundSync"
    verify:
      type: visible_text
      text: "browser://settings/content/backgroundSync"
  - id: load-background-sync
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Background sync
