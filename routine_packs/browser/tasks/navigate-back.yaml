name: Browser navigate back task
allowed_windows:
  - Browser
timeout_seconds: 25
steps:
  - id: confirm-browser
    action: wait_for
    target: Browser
  - id: navigate-back
    action: press_key
    text: alt+left
    verify:
      type: visible_text
      text: Browser
  - id: confirm-back-navigation
    action: assert_visible
    verify:
      type: visible_text
      text: Browser
