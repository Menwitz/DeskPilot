name: Browser system settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-system-url
    action: type_text
    text: browser://settings/system
    verify:
      type: visible_text
      text: browser://settings/system
  - id: load-system-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: System
