name: Browser open extensions task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-extensions-url
    action: type_text
    text: browser://extensions
    verify:
      type: visible_text
      text: browser://extensions
  - id: load-extensions
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Extensions
