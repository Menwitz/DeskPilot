name: Browser startup settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-startup-settings-url
    action: type_text
    text: "browser://settings/onStartup"
    verify:
      type: visible_text
      text: "browser://settings/onStartup"
  - id: load-startup-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Startup
