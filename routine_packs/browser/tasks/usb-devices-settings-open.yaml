name: Browser USB devices settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-usb-devices-url
    action: type_text
    text: "browser://settings/content/usbDevices"
    verify:
      type: visible_text
      text: "browser://settings/content/usbDevices"
  - id: load-usb-devices
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: USB devices
