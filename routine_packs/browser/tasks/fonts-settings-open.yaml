name: Browser fonts settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-fonts-settings-open-url
    action: type_text
    text: "browser://settings/fonts"
    verify:
      type: visible_text
      text: "browser://settings/fonts"
  - id: load-fonts-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Fonts
