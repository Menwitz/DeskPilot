name: Browser virtual reality settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-virtual-reality-settings-open-url
    action: type_text
    text: "browser://settings/content/vr"
    verify:
      type: visible_text
      text: "browser://settings/content/vr"
  - id: load-virtual-reality-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Virtual reality
