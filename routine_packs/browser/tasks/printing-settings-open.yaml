name: Browser printing settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-printing-settings-url
    action: type_text
    text: "browser://settings/printing"
    verify:
      type: visible_text
      text: "browser://settings/printing"
  - id: load-printing-settings
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Printing
