name: Browser zoom levels settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-zoom-levels-settings-open-url
    action: type_text
    text: "browser://settings/content/zoomLevels"
    verify:
      type: visible_text
      text: "browser://settings/content/zoomLevels"
  - id: load-zoom-levels-settings-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Zoom levels
