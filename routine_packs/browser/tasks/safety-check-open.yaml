name: Browser safety check open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-safety-check-open-url
    action: type_text
    text: "browser://settings/safetyCheck"
    verify:
      type: visible_text
      text: "browser://settings/safetyCheck"
  - id: load-safety-check-open
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Safety check
