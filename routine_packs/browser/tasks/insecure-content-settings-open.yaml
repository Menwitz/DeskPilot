name: Browser insecure content settings open task
allowed_windows:
  - Browser
timeout_seconds: 30
steps:
  - id: focus-address-bar
    action: press_key
    text: ctrl+l
    verify:
      type: visible_text
      text: Address
  - id: type-insecure-content-url
    action: type_text
    text: "browser://settings/content/insecureContent"
    verify:
      type: visible_text
      text: "browser://settings/content/insecureContent"
  - id: load-insecure-content
    action: press_key
    text: enter
    verify:
      type: visible_text
      text: Insecure content
